# docker-compose.yml FINAL

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=archiflow_db
      - POSTGRES_USER=archiflow_user
      - POSTGRES_PASSWORD=supersecretpassword
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U archiflow_user -d archiflow_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  user_service:
    build: ./user_service
    volumes:
      - ./user_service:/app
    environment:
      - DJANGO_SETTINGS_MODULE=settings
      - DB_HOST=db
      - DB_NAME=archiflow_db
      - DB_USER=archiflow_user
      - DB_PASS=supersecretpassword
    depends_on:
      db:
        condition: service_healthy

  client_service:
    build: ./client_service
    volumes:
      - ./client_service:/app
    environment:
      - DJANGO_SETTINGS_MODULE=settings
      - DB_HOST=db
      - DB_NAME=archiflow_db
      - DB_USER=archiflow_user
      - DB_PASS=supersecretpassword
    depends_on:
      db:
        condition: service_healthy

  project_service:
    build: ./project_service
    volumes:
      - ./project_service:/app
    environment:
      - DJANGO_SETTINGS_MODULE=settings
      - DB_HOST=db
      - DB_NAME=archiflow_db
      - DB_USER=archiflow_user
      - DB_PASS=supersecretpassword
    depends_on:
      db:
        condition: service_healthy
  
  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - user_service
      - client_service
      - project_service

volumes:
  postgres_data: