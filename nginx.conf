# nginx.conf

# Define os "grupos de servidores" para cada microsserviço.
# Os nomes (user_service, client_service, project_service) devem ser os mesmos
# nomes dos serviços definidos no seu arquivo docker-compose.yml.
# A porta (8000) é a porta interna que o Django está usando dentro do contêiner.

upstream user_service {
    server user_service:8000;
}

upstream client_service {
    server client_service:8000;
}

upstream project_service {
    server project_service:8000;
}

server {
    # O Nginx vai ouvir na porta 80, que é a porta padrão para HTTP.
    listen 80;

    # Regra 1: Se a URL começar com /api/auth/, envie para o serviço de usuários.
    location /api/auth/ {
        proxy_pass http://user_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Regra 2: Se a URL começar com /api/clients/, envie para o serviço de clientes.
    location /api/clients/ {
        proxy_pass http://client_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Regra 3: Se a URL começar com /api/projects/, envie para o serviço de projetos.
    location /api/projects/ {
        proxy_pass http://project_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}